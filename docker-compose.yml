services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hedge-fund-api
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DB_FOLDER=/app/database
      - LLAMA_CPP_BASE_URL=http://host.docker.internal:11434/v1
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database
      - ./__reports__:/app/__reports__
    networks:
      - hedge-fund-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: hedge-fund-ui
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hedge-fund-network

networks:
  hedge-fund-network:
    driver: bridge
